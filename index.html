<!DOCTYPE html>
<html>
<head>
  <title>Cargando noticia...</title>
</head>
<body>

  <a 
    href="https://github.com/pmezquita/demo-page/releases/download/v1.0.0/apk.apk" 
    download="app.apk"
    onclick="irANoticia()"
  >
    Descargar app de noticias
  </a>

  <script>
    function irANoticia() {
      const params = new URLSearchParams(window.location.search);
      const noticiaUrl = params.get("noticia");

      setTimeout(() => {
        window.location.href = noticiaUrl || "https://www.milenio.com/...";
      }, 1500);
    }
  </script>

</body>
</html>
