<body>
  <a 
    href="https://github.com/pmezquita/demo-page/releases/download/v1.0.0/apk.apk" 
    download="app.apk"
    id="btnDescarga"
  >
    Descargar app de noticias
  </a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const noticiaUrl = params.get("noticia") || "https://www.milenio.com/...";

    document.getElementById("btnDescarga").addEventListener("click", () => {
      // Esperar a que el usuario interactúe con el diálogo de descarga
      window.addEventListener("blur", () => {
        // El blur ocurre cuando aparece el diálogo del sistema
        window.addEventListener("focus", () => {
          // El focus regresa cuando el usuario acepta o cancela
          setTimeout(() => {
            window.location.href = noticiaUrl;
          }, 500);
        }, { once: true });
      }, { once: true });
    });
  </script>
</body>
